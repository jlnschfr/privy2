name: E2E

# Fires after Netlify posts a deployment_status event. We only want the
# branch deploy for `develop` (served at develop--privy-notes2.netlify.app);
# production deploys and PR previews are filtered out by matching the
# target URL below.
on:
  deployment_status:

jobs:
  playwright:
    if: github.event.deployment_status.state == 'success' && contains(github.event.deployment_status.target_url, 'develop--privy-notes2.netlify.app')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NODE_OPTIONS: --max-old-space-size=4096
      NPM_CONFIG_FUND: false
      NPM_CONFIG_AUDIT: false
      FORCE_COLOR: 0
      BASE_URL: https://develop--privy-notes2.netlify.app
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install dependencies
        run: npm ci || npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
